name: Deploy to GitHub Pages & Cloudflare

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Trigger Cloudflare Pages deploy
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/2c3d1b0d2d2c1e839fafb02be42562d4/pages/projects/aether/deploy_hooks/04fa47e2-3aea-4ec0-952c-fc4c41fe1b3a/trigger"
